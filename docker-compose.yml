# DataSiteForge local infrastructure.
#
# The core storage engines (SQLite + DuckDB) are embedded and require no
# services. This file provisions the optional supporting infrastructure used by
# later phases: a privacy-friendly analytics instance (Plausible) for telemetry
# (Phase 6/7) and an outbound HTTP proxy for the Scout (Phase 2). They are
# defined here for convenience and are commented out until those phases land.
#
# Bring up only what you need, e.g.:  docker compose up -d plausible_db plausible
