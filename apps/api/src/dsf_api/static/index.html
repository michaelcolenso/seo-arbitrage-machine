<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataSiteForge · Operator Console</title>
    <!-- Self-hosted assets only: the console handles the control-plane token, so
         it must never execute third-party scripts that could exfiltrate it. -->
    <link rel="stylesheet" href="/static/console.css" />
    <script defer src="/static/alpine.min.js"></script>
  </head>
  <body class="bg-slate-100 text-slate-900 antialiased">
    <main class="mx-auto max-w-5xl px-4 py-8" x-data="dsfConsole()" x-init="refresh()">
      <header class="mb-6 flex items-center justify-between gap-3">
        <h1 class="text-2xl font-bold tracking-tight">DataSiteForge · Operator Console</h1>
        <div class="flex items-center gap-2">
          <input x-model="token" @change="saveToken()" type="password" placeholder="API token (if set)"
                 class="w-44 rounded-lg border border-slate-300 px-3 py-1.5 text-sm" />
          <button @click="refresh()" class="rounded-lg bg-slate-800 px-3 py-1.5 text-sm font-medium text-white hover:bg-slate-700">
            Refresh
          </button>
        </div>
      </header>

      <!-- Revenue scorecard -->
      <section class="mb-6 grid grid-cols-2 gap-4 sm:grid-cols-4">
        <template x-for="card in scorecards()" :key="card.label">
          <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="text-xs uppercase tracking-wide text-slate-500" x-text="card.label"></div>
            <div class="mt-1 text-2xl font-bold" x-text="card.value"></div>
          </div>
        </template>
      </section>

      <!-- Scout launcher -->
      <section class="mb-6 rounded-xl border border-indigo-100 bg-indigo-50 p-5">
        <h2 class="text-lg font-semibold text-indigo-900">Launch a scouting pass</h2>
        <div class="mt-3 flex flex-wrap items-center gap-3">
          <input x-model="niche" placeholder="Seed niche (e.g. compliance)"
                 class="w-64 rounded-lg border border-slate-300 px-3 py-2" />
          <label class="flex items-center gap-2 text-sm text-slate-700">
            <input type="checkbox" x-model="live" /> live open-data
          </label>
          <button @click="runScout()" :disabled="!niche"
                  class="rounded-lg bg-indigo-600 px-4 py-2 font-medium text-white hover:bg-indigo-700 disabled:opacity-50">
            Run scout
          </button>
          <span class="text-sm text-slate-600" x-text="lastJob"></span>
        </div>
      </section>

      <!-- Fleet counts -->
      <section class="mb-6 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="mb-3 text-lg font-semibold">Fleet state</h2>
        <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
          <template x-for="(value, key) in (fleet.counts || {})" :key="key">
            <div class="flex items-center justify-between rounded-lg bg-slate-50 px-3 py-2">
              <span class="text-sm text-slate-600" x-text="key"></span>
              <span class="font-semibold" x-text="value"></span>
            </div>
          </template>
        </div>
      </section>

      <!-- Live sites -->
      <section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="mb-3 text-lg font-semibold">Live sites</h2>
        <template x-if="(fleet.live_sites || []).length === 0">
          <p class="text-sm text-slate-500">No live sites yet.</p>
        </template>
        <ul class="divide-y divide-slate-100">
          <template x-for="site in (fleet.live_sites || [])" :key="site.deployment_id">
            <li class="flex items-center justify-between py-2">
              <span class="font-medium" x-text="site.project_slug"></span>
              <a :href="site.live_url" target="_blank" class="text-indigo-600 hover:underline" x-text="site.live_url"></a>
            </li>
          </template>
        </ul>
      </section>
    </main>

    <script>
      function dsfConsole() {
        return {
          fleet: {},
          revenue: {},
          niche: '',
          live: false,
          lastJob: '',
          token: localStorage.getItem('dsf_token') || '',
          saveToken() {
            localStorage.setItem('dsf_token', this.token || '');
          },
          headers(extra) {
            const h = Object.assign({}, extra || {});
            if (this.token) h['X-API-Key'] = this.token;
            return h;
          },
          async refresh() {
            this.fleet = await (await fetch('/fleet/status', { headers: this.headers() })).json();
            this.revenue = await (await fetch('/analytics/revenue', { headers: this.headers() })).json();
          },
          scorecards() {
            const r = this.revenue || {};
            return [
              { label: 'Revenue (USD)', value: r.revenue_usd ?? 0 },
              { label: 'Impressions', value: r.impressions ?? 0 },
              { label: 'CTR', value: ((r.ctr ?? 0) * 100).toFixed(2) + '%' },
              { label: 'Live deploys', value: r.live_deployments ?? 0 },
            ];
          },
          async runScout() {
            this.lastJob = 'submitting…';
            const resp = await fetch('/scout/run', {
              method: 'POST',
              headers: this.headers({ 'Content-Type': 'application/json' }),
              body: JSON.stringify({ niche: this.niche, live: this.live }),
            });
            const job = await resp.json();
            this.lastJob = `job ${job.job_id.slice(0, 8)} · ${job.status}`;
            this.poll(job.job_id);
          },
          async poll(jobId) {
            for (let i = 0; i < 30; i++) {
              const job = await (await fetch(`/jobs/${jobId}`, { headers: this.headers() })).json();
              this.lastJob = `job ${jobId.slice(0, 8)} · ${job.status}`;
              if (job.status === 'succeeded' || job.status === 'failed') {
                await this.refresh();
                return;
              }
              await new Promise((r) => setTimeout(r, 1000));
            }
          },
        };
      }
    </script>
  </body>
</html>
