[project]
name = "datasiteforge-engine"
version = "0.1.0"
description = "DataSiteForge engine: SQLModel state store and thread-safe DuckDB analytical broker."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasiteforge-core",
    "sqlmodel>=0.0.22",
    "duckdb>=1.0",
    "typer>=0.12",
    "rich>=13.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dsf_engine"]
