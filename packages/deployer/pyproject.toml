[project]
name = "datasiteforge-deployer"
version = "0.1.0"
description = "DataSiteForge deployer: zero-cost Cloudflare Pages deployment of compiled sites."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasiteforge-core",
    "datasiteforge-engine",
    "httpx>=0.27",
    "typer>=0.12",
    "rich>=13.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dsf_deployer"]
