[project]
name = "datasiteforge-scout"
version = "0.1.0"
description = "DataSiteForge scout: arbitrage miner and multi-source candidate discovery."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasiteforge-core",
    "datasiteforge-engine",
    "pydantic>=2.6",
    "httpx>=0.27",
    "typer>=0.12",
    "rich>=13.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dsf_scout"]
