[project]
name = "datasiteforge-mcp"
version = "0.1.0"
description = "DataSiteForge MCP server: exposes the lifecycle as agent-native tools and resources."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasiteforge-core",
    "datasiteforge-engine",
    "datasiteforge-scout",
    "datasiteforge-compiler",
    "datasiteforge-deployer",
    "datasiteforge-optimizer",
    "mcp>=1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dsf_mcp"]
