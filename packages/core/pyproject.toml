[project]
name = "datasiteforge-core"
version = "0.1.0"
description = "DataSiteForge core: settings, telemetry, Agent Bridge / MCP interface, and the seo-platform CLI."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
]

[project.scripts]
seo-platform = "dsf_core.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dsf_core"]
